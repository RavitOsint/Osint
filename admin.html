<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>CyberQuest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #1e293b; --main-bg: #f8fafc; --accent: #38bdf8; --error: #ef4444; }
        body { font-family: 'Assistant', sans-serif; margin: 0; display: flex; background: var(--main-bg); min-height: 100vh; }
        #loginArea { position: fixed; inset: 0; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-card { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
        .tab-btn { display: block; width: 100%; padding: 15px; margin-bottom: 8px; border: none; background: none; color: #94a3b8; text-align: right; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--accent); color: var(--sidebar-bg); font-weight: bold; }
        .main-panel { margin-right: 260px; flex: 1; padding: 40px; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; }
        button { background: var(--accent); color: var(--sidebar-bg); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { text-align: right; padding: 12px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="login-card">
        <h2>כניסת מנהלת</h2>
        <input type="password" id="adminPass" placeholder="סיסמת ניהול">
        <p id="errorMsg" style="color: var(--error); display: none;">סיסמה שגויה</p>
        <button onclick="login()">כניסה</button>
    </div>
</div>

<div class="sidebar">
    <h2>CyberQuest</h2>
    <button class="tab-btn active" onclick="showTab('qTab', this)">📚 ניהול שאלות</button>
    <button class="tab-btn" onclick="showTab('gradingTab', this)">🎓 ציונים</button>
    <button class="tab-btn" onclick="showTab('settingsTab', this)">⚙️ הגדרות</button>
</div>

<div class="main-panel">
    <div id="qTab" class="tab-content">
        <div class="card">
            <h2>➕ הוספת שאלה</h2>
            <select id="qCatSelect"><option value="">בחרי קטגוריה...</option></select>
            <textarea id="qText" placeholder="תוכן השאלה..."></textarea>
            <input id="qAns" placeholder="תשובה">
            <button onclick="saveQuestion()">שמור שאלה</button>
        </div>
        <div class="card">
            <h2>🔍 מאגר</h2>
            <table>
                <thead><tr><th>שאלה</th><th>תשובה</th><th>פעולות</th></tr></thead>
                <tbody id="qTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="gradingTab" class="tab-content hidden">
        <div class="card"><h2>📊 ציונים ותשובות</h2><div id="subTable">טוען נתונים...</div></div>
    </div>

    <div id="settingsTab" class="tab-content hidden">
        <div class="card">
            <h2>📁 קטגוריות</h2>
            <input id="newCatName" placeholder="שם קטגוריה">
            <button onclick="addCat()">הוסף קטגוריה</button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/"; 
    const PASS = "zigi2026";

    function login() {
        const p = document.getElementById('adminPass').value;
        if(p === PASS) {
            document.getElementById('loginArea').classList.add('hidden');
            loadAll();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
    }

    async function loadAll() {
        try {
            const res = await fetch(`${BASE_URL}categories.json`);
            const data = await res.json();
            
            const selects = ['qCatSelect'];
            selects.forEach(sId => {
                const s = document.getElementById(sId);
                s.innerHTML = '<option value="">בחרי קטגוריה...</option>';
                if(data) {
                    for(let id in data) s.innerHTML += `<option value="${data[id].name}">${data[id].name}</option>`;
                }
            });
            loadQuestions();
        } catch(e) { console.error(e); }
    }

    async function addCat() {
        const name = document.getElementById('newCatName').value;
        if(!name) return;
        await fetch(`${BASE_URL}categories.json`, { method: 'POST', body: JSON.stringify({name}) });
        alert("קטגוריה נוספה!");
        document.getElementById('newCatName').value = "";
        loadAll();
    }

    async function saveQuestion() {
        const cat = document.getElementById('qCatSelect').value;
        const text = document.getElementById('qText').value;
        const answer = document.getElementById('qAns').value;
        if(!cat || !text) return alert("מלאי קטגוריה ושאלה");

        await fetch(`${BASE_URL}questions.json`, { method: 'POST', body: JSON.stringify({category: cat, text, answer}) });
        alert("שאלה נשמרה!");
        document.getElementById('qText').value = "";
        document.getElementById('qAns').value = "";
        loadQuestions();
    }

    async function loadQuestions() {
        try {
            const res = await fetch(`${BASE_URL}questions.json`);
            const data = await res.json();
            const tbody = document.getElementById('qTableBody');
            tbody.innerHTML = "";
            if(data) {
                for(let id in data) {
                    tbody.innerHTML += `<tr><td>${data[id].text}</td><td>${data[id].answer}</td><td><button onclick="del('questions/${id}')" style="background:red; color:white; width:auto;">מחק</button></td></tr>`;
                }
            }
        } catch(e) { console.error(e); }
    }

    async function del(path) {
        if(confirm('למחוק?')) {
            await fetch(`${BASE_URL}${path}.json`, { method: 'DELETE' });
            loadQuestions();
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>CyberQuest Admin - ניהול ובדיקה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #1e293b; --main-bg: #f8fafc; --accent: #38bdf8; --error: #ef4444; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Assistant', sans-serif; margin: 0; display: flex; background: var(--main-bg); min-height: 100vh; }
        
        /* לוגין */
        #loginArea { position: fixed; inset: 0; background: #1e293b; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* פאנל ניהול */
        #adminContent { display: none; width: 100%; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 20px; position: fixed; height: 100vh; }
        .main-panel { margin-right: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .tab-btn { display: block; width: 100%; padding: 15px; margin-bottom: 8px; border: none; background: none; color: #94a3b8; text-align: right; cursor: pointer; border-radius: 8px; font-size: 1rem; }
        .tab-btn.active { background: var(--accent); color: var(--sidebar-bg); font-weight: bold; }
        
        input[type="text"], input[type="password"], select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        button { background: var(--accent); color: var(--sidebar-bg); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: right; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        /* עיצוב בדיקת מבחנים */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .student-card { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s; }
        .student-card:hover { border-color: var(--accent); background: #f0f9ff; }
        
        .exam-item { border-bottom: 2px solid #f1f5f9; padding: 20px 0; }
        .check-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-check { width: auto; padding: 8px 20px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge-auto { background: #e0f2fe; color: #0369a1; }
        .badge-manual { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="login-card">
        <h2>כניסת מנהלת</h2>
        <input type="password" id="adminPass" placeholder="סיסמת ניהול">
        <p id="errorMsg" style="color: var(--error); display: none;">סיסמה שגויה!</p>
        <button onclick="login()">כניסה</button>
    </div>
</div>

<div id="adminContent">
    <div class="sidebar">
        <h2 style="color: var(--accent);">CyberQuest Admin</h2>
        <button class="tab-btn active" onclick="showTab('qTab', this)">📚 ניהול שאלות</button>
        <button class="tab-btn" onclick="showTab('gradingTab', this)">🎓 בדיקת מבחנים</button>
        <button class="tab-btn" onclick="showTab('settingsTab', this)">⚙️ הגדרות ושידור</button>
    </div>

    <div class="main-panel">
        
        <div id="qTab" class="tab-content">
            <div class="card">
                <h2>➕ הוספת שאלה חדשה</h2>
                <select id="qCatSelect"></select>
                
                <select id="qType" onchange="toggleFormFields()">
                    <option value="open">שאלה פתוחה</option>
                    <option value="multiple">שאלה אמריקאית</option>
                </select>

                <div id="flagToggleArea" style="margin: 10px 0;">
                    <label style="cursor: pointer;">
                        <input type="checkbox" id="hasFlag" onchange="toggleFormFields()"> יש Flag לבדיקה אוטומטית?
                    </label>
                </div>

                <textarea id="qText" placeholder="תוכן השאלה..."></textarea>
                
                <div id="answerInputArea" class="hidden">
                    <input id="qAns" placeholder="הזיני את התשובה הנכונה (ה-Flag)">
                </div>

                <div id="optArea" class="hidden">
                    <p>אופציות לבחירה:</p>
                    <div id="ansList"></div>
                    <button onclick="addOptionField()" style="background:#e2e8f0; color:#475569; width:auto;">+ הוסף אופציה</button>
                </div>

                <button onclick="saveQuestion()">שמור שאלה במאגר</button>
            </div>
            
            <div class="card">
                <h2>🔍 מאגר שאלות קיים</h2>
                <table>
                    <thead><tr><th>קטגוריה</th><th>סוג</th><th>שאלה</th><th>פעולות</th></tr></thead>
                    <tbody id="qTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="gradingTab" class="tab-content hidden">
            <div id="studentListArea" class="card">
                <h2>👥 רשימת הגשות</h2>
                <div id="studentsGrid" class="student-grid"></div>
            </div>

            <div id="examViewArea" class="card hidden">
                <button onclick="backToList()" style="width:auto; background:#64748b; color:white;">⬅️ חזרה לרשימה</button>
                <h2 id="viewingStudentName">בדיקת מבחן</h2>
                <div id="examContent"></div>
            </div>
        </div>

        <div id="settingsTab" class="tab-content hidden">
            <div class="card">
                <h2>📺 שידור לחניכים</h2>
                <select id="activeCatSelect"></select>
                <button onclick="setActive()" style="background: var(--success); color: white;">🚀 הפעל קטגוריה</button>
            </div>
            <div class="card">
                <h2>📁 ניהול קטגוריות</h2>
                <input id="newCatName" placeholder="שם קטגוריה">
                <button onclick="addCat()">הוסף קטגוריה</button>
            </div>
        </div>

    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/"; 
    const PASS = "zigi2026";

    // --- לוגיקה של הטופס ---
    function toggleFormFields() {
        const type = document.getElementById('qType').value;
        const hasFlag = document.getElementById('hasFlag').checked;
        
        // הצגת Checkbox רק בשאלה פתוחה
        document.getElementById('flagToggleArea').classList.toggle('hidden', type === 'multiple');
        
        // הצגת שדה התשובה אם זה אמריקאי או אם סימנו שיש Flag
        const showAns = (type === 'multiple') || (type === 'open' && hasFlag);
        document.getElementById('answerInputArea').classList.toggle('hidden', !showAns);
        
        // הצגת אופציות רק באמריקאי
        document.getElementById('optArea').classList.toggle('hidden', type !== 'multiple');
    }

    function addOptionField() {
        const i = document.createElement('input');
        i.className = "opt-input"; i.style.marginBottom = "5px"; i.placeholder = "אופציה...";
        document.getElementById('ansList').appendChild(i);
    }

    async function saveQuestion() {
        const type = document.getElementById('qType').value;
        const flagChecked = document.getElementById('hasFlag').checked;
        const opts = Array.from(document.querySelectorAll('.opt-input')).map(i => i.value).filter(v => v);

        const data = {
            category: document.getElementById('qCatSelect').value,
            type: type,
            text: document.getElementById('qText').value,
            hasFlag: type === 'multiple' ? true : flagChecked,
            answer: (type === 'multiple' || flagChecked) ? document.getElementById('qAns').value.trim() : "",
            options: type === 'multiple' ? opts : null
        };

        if(!data.category || !data.text) return alert("מלאי שדות חובה");

        await fetch(`${BASE_URL}questions.json`, { method: 'POST', body: JSON.stringify(data) });
        alert("נשמר!");
        location.reload();
    }

    // --- לוגיקה של בדיקת מבחנים ---
    async function loadSubmissions() {
        const res = await fetch(`${BASE_URL}submissions.json`);
        const data = await res.json();
        const grid = document.getElementById('studentsGrid');
        grid.innerHTML = "";
        
        if(!data) return grid.innerHTML = "אין הגשות עדיין.";

        const students = [...new Set(Object.values(data).map(s => s.student))];
        students.forEach(name => {
            const div = document.createElement('div');
            div.className = "student-card";
            div.innerHTML = `<h3>👤 ${name}</h3><p>לחצי לבדיקת מבחן</p>`;
            div.onclick = () => openExam(name, data);
            grid.appendChild(div);
        });
    }

    function openExam(studentName, allSubs) {
        document.getElementById('studentListArea').classList.add('hidden');
        document.getElementById('examViewArea').classList.remove('hidden');
        document.getElementById('viewingStudentName').innerText = "מבחן של: " + studentName;
        
        const content = document.getElementById('examContent');
        content.innerHTML = "";

        const mySubs = Object.keys(allSubs)
            .filter(id => allSubs[id].student === studentName)
            .map(id => ({dbId: id, ...allSubs[id]}));

        mySubs.forEach((sub, idx) => {
            const div = document.createElement('div');
            div.className = "exam-item";
            
            // זיהוי אם הבדיקה היא אוטומטית או ידנית
            const isManual = (sub.correctAnswer === "" || sub.correctAnswer === undefined);
            const badge = isManual ? '<span class="badge badge-manual">בדיקה ידנית</span>' : '<span class="badge badge-auto">בדיקה אוטומטית</span>';
            
            let statusHtml = "";
            if (!isManual) {
                const color = sub.isCorrect ? 'var(--success)' : 'var(--error)';
                statusHtml = `<p>תוצאת מערכת: <strong style="color:${color}">${sub.isCorrect ? 'נכון' : 'שגוי'}</strong></p>`;
            }

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>שאלה ${idx+1}</strong> ${badge}
                </div>
                <p>${sub.questionText}</p>
                <p>תשובת החניך: <span style="color:blue; font-weight:bold;">${sub.userAnswer}</span></p>
                ${statusHtml}
                <div class="check-buttons">
                    <button class="btn-check" onclick="updateStatus('${sub.dbId}', true)" style="background:var(--success); color:white">סמן כנכון ✅</button>
                    <button class="btn-check" onclick="updateStatus('${sub.dbId}', false)" style="background:var(--error); color:white">סמן כשגוי ❌</button>
                </div>
            `;
            content.appendChild(div);
        });
    }

    async function updateStatus(id, status) {
        await fetch(`${BASE_URL}submissions/${id}/isCorrect.json`, { method: 'PUT', body: JSON.stringify(status) });
        alert("עודכן!");
        loadSubmissions(); 
    }

    function backToList() {
        document.getElementById('examViewArea').classList.add('hidden');
        document.getElementById('studentListArea').classList.remove('hidden');
    }

    // --- תשתיות ---
    function login() {
        if(document.getElementById('adminPass').value === PASS) {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('adminContent').style.display = 'flex';
            loadAll();
        } else { document.getElementById('errorMsg').style.display='block'; }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
        if(id === 'gradingTab') loadSubmissions();
    }

    async function loadAll() {
        const res = await fetch(`${BASE_URL}categories.json`);
        const data = await res.json();
        ['qCatSelect', 'activeCatSelect'].forEach(sId => {
            const s = document.getElementById(sId);
            s.innerHTML = '<option value="">בחרי קטגוריה...</option>';
            for(let id in data) s.innerHTML += `<option value="${data[id].name}">${data[id].name}</option>`;
        });
        loadQuestions();
    }

    async function loadQuestions() {
        const res = await fetch(`${BASE_URL}questions.json`);
        const data = await res.json();
        const tbody = document.getElementById('qTableBody');
        tbody.innerHTML = "";
        for(let id in data) {
            tbody.innerHTML += `<tr><td>${data[id].category}</td><td>${data[id].type}</td><td>${data[id].text}</td><td><button onclick="del('questions/${id}')" style="background:red; color:white; width:auto;">מחק</button></td></tr>`;
        }
    }

    async function addCat() {
        const name = document.getElementById('newCatName').value;
        await fetch(`${BASE_URL}categories.json`, { method: 'POST', body: JSON.stringify({name}) });
        location.reload();
    }

    async function setActive() {
        const cat = document.getElementById('activeCatSelect').value;
        await fetch(`${BASE_URL}settings.json`, { method: 'PUT', body: JSON.stringify({activeCategory: cat}) });
        alert("משודר!");
    }

    async function del(path) { if(confirm('למחוק?')) { await fetch(`${BASE_URL}${path}.json`, { method: 'DELETE' }); location.reload(); } }
</script>
</body>
</html>

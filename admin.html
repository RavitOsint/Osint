<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CyberQuest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar: #1e293b; --bg: #f8fafc; --accent: #38bdf8; --error: #ef4444; --success: #10b981; }
        body { font-family: 'Assistant', sans-serif; margin: 0; background: var(--bg); display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; position: fixed; height: 100vh; }
        .main { margin-right: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .tab-btn { display: block; width: 100%; padding: 15px; margin-bottom: 8px; border: none; background: none; color: #94a3b8; text-align: right; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: var(--sidebar); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--accent); color: var(--sidebar); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #f1f5f9; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>CyberQuest Admin</h2>
    <button class="tab-btn active" onclick="showTab('qTab', this)">📚 שאלות</button>
    <button class="tab-btn" onclick="showTab('gradeTab', this)">📊 ציונים</button>
    <button class="tab-btn" onclick="showTab('setTab', this)">⚙️ הגדרות</button>
</div>

<div class="main">
    <div id="qTab" class="tab-content">
        <div class="card">
            <h3>הוספת שאלה</h3>
            <select id="qCat"></select>
            <select id="qType" onchange="toggleF()">
                <option value="open">שאלה פתוחה</option>
                <option value="multiple">אמריקאית</option>
            </select>
            <textarea id="qText" placeholder="תוכן השאלה..."></textarea>
            <input id="qAns" placeholder="התשובה הנכונה (Flag)">
            <div id="optArea" class="hidden">
                <p>הזן אופציות (אחת בשורה):</p>
                <textarea id="qOpts" placeholder="אופציה 1&#10;אופציה 2"></textarea>
            </div>
            <button onclick="saveQ()" style="width:100%">שמור שאלה</button>
        </div>
    </div>

    <div id="gradeTab" class="tab-content hidden">
        <div id="listArea">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3>תוצאות</h3>
                <div>
                    <button onclick="exportCSV()" style="background:var(--success); color:white">📥 אקסל</button>
                    <button onclick="clearData()" style="background:var(--error); color:white">🗑️ איפוס</button>
                </div>
            </div>
            <div id="grid"></div>
        </div>
        <div id="detArea" class="hidden">
            <button onclick="back()">⬅️ חזרה</button>
            <h2 id="detName"></h2>
            <div id="detCont"></div>
        </div>
    </div>

    <div id="setTab" class="tab-content hidden">
        <div class="card">
            <h3>הפעלת קטגוריה</h3>
            <label>סוג משחק:</label>
            <select id="gameMode">
                <option value="quiz">📝 בוחן (מעבר חופשי)</option>
                <option value="escape">🏃 חדר בריחה (ענישה על טעות)</option>
            </select>
            <label>קטגוריה:</label>
            <select id="activeCat"></select>
            <button onclick="saveSet()" style="width:100%; margin-top:10px;">שדר לחניכים</button>
        </div>
        <div class="card">
            <input id="newCat" placeholder="שם קטגוריה חדשה">
            <button onclick="addCat()">הוסף</button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    let subs = {};

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
        if(id === 'gradeTab') loadSubs();
    }

    function toggleF() {
        document.getElementById('optArea').classList.toggle('hidden', document.getElementById('qType').value !== 'multiple');
    }

    async function init() {
        const r = await fetch(`${BASE_URL}categories.json`), cats = await r.json();
        ['qCat', 'activeCat'].forEach(id => {
            const s = document.getElementById(id); s.innerHTML = "";
            for(let k in cats) s.innerHTML += `<option value="${cats[k].name}">${cats[k].name}</option>`;
        });
    }

    async function saveQ() {
        const type = document.getElementById('qType').value;
        const opts = document.getElementById('qOpts').value.split('\n').filter(v => v.trim());
        const data = {
            category: document.getElementById('qCat').value,
            type: type,
            text: document.getElementById('qText').value,
            answer: document.getElementById('qAns').value.trim(),
            options: type === 'multiple' ? opts : null
        };
        await fetch(`${BASE_URL}questions.json`, { method: 'POST', body: JSON.stringify(data) });
        alert("נשמר");
    }

    async function loadSubs() {
        const r = await fetch(`${BASE_URL}submissions.json`);
        subs = await r.json() || {};
        const g = document.getElementById('grid'); g.innerHTML = "";
        const names = [...new Set(Object.values(subs).map(s => s.student))];
        names.forEach(n => {
            const my = Object.values(subs).filter(s => s.student === n);
            const ok = my.filter(s => s.isCorrect === true).length;
            const score = Math.round((ok/my.length)*100) || 0;
            const d = document.createElement('div'); d.className="student-row";
            d.innerHTML = `<span>👤 ${n}</span><span>${score}%</span>`;
            d.onclick = () => view(n); g.appendChild(d);
        });
    }

    function view(n) {
        document.getElementById('listArea').classList.add('hidden');
        document.getElementById('detArea').classList.remove('hidden');
        document.getElementById('detName').innerText = n;
        const c = document.getElementById('detCont'); c.innerHTML = "";
        Object.keys(subs).filter(id => subs[id].student === n).forEach(id => {
            const s = subs[id];
            c.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px;">
                <p><strong>${s.questionText}</strong></p>
                <p>תשובה: ${s.userAnswer} ${s.isCorrect === true ? '✅' : (s.isCorrect === false ? '❌' : '⏳')}</p>
                ${s.isCorrect === null ? `
                    <button onclick="mark('${id}', true, '${n}')">נכון</button>
                    <button onclick="mark('${id}', false, '${n}')">שגוי</button>
                ` : ''}
            </div>`;
        });
    }

    async function mark(id, v, n) {
        await fetch(`${BASE_URL}submissions/${id}/isCorrect.json`, { method: 'PUT', body: JSON.stringify(v) });
        loadSubs().then(() => view(n));
    }

    function back() { document.getElementById('detArea').classList.add('hidden'); document.getElementById('listArea').classList.remove('hidden'); }

    async function saveSet() {
        const d = { gameMode: document.getElementById('gameMode').value, activeCategory: document.getElementById('activeCat').value };
        await fetch(`${BASE_URL}settings.json`, { method: 'PUT', body: JSON.stringify(d) });
        alert("שידור הופעל");
    }

    async function addCat() {
        const name = document.getElementById('newCat').value;
        await fetch(`${BASE_URL}categories.json`, { method: 'POST', body: JSON.stringify({name}) });
        init();
    }

    async function clearData() {
        if(confirm("למחוק הכל?")) { await fetch(`${BASE_URL}submissions.json`, { method: 'DELETE' }); loadSubs(); }
    }

    function exportCSV() {
        let csv = "\uFEFFשם,ציון\n";
        const names = [...new Set(Object.values(subs).map(s => s.student))];
        names.forEach(n => {
            const my = Object.values(subs).filter(s => s.student === n);
            const score = Math.round((my.filter(s => s.isCorrect === true).length/my.length)*100) || 0;
            csv += `${n},${score}%\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "cyberquest_results.csv"; link.click();
    }

    init();
</script>
</body>
</html>

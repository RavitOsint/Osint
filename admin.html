<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CyberQuest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar: #1e293b; --bg: #f8fafc; --accent: #38bdf8; --error: #ef4444; --success: #10b981; }
        body { font-family: 'Assistant', sans-serif; margin: 0; background: var(--bg); display: flex; min-height: 100vh; }
        
        #loginArea { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; text-align: center; }
        
        #adminContent { display: none; width: 100%; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 20px; position: fixed; height: 100vh; }
        .main { margin-right: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .tab-btn { display: block; width: 100%; padding: 15px; margin-bottom: 8px; border: none; background: none; color: #94a3b8; text-align: right; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: var(--sidebar); }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--accent); color: var(--sidebar); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #f1f5f9; }
        .score-pill { background: #e2e8f0; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        
        .exam-item { border-right: 4px solid #cbd5e1; padding: 15px; margin-bottom: 15px; background: #f8fafc; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="login-card">
        <h2>כניסת מנהלת</h2>
        <input type="password" id="adminPass" placeholder="סיסמה">
        <button onclick="login()">כניסה</button>
    </div>
</div>

<div id="adminContent">
    <div class="sidebar">
        <h2>CyberQuest Admin</h2>
        <button class="tab-btn active" onclick="showTab('qTab', this)">📚 שאלות</button>
        <button class="tab-btn" onclick="showTab('gradeTab', this)">📊 ציונים</button>
        <button class="tab-btn" onclick="showTab('setTab', this)">⚙️ הגדרות</button>
    </div>

    <div class="main">
        <div id="qTab" class="tab-content">
            <div class="card">
                <h3>הוספת שאלה</h3>
                <select id="qCat"></select>
                <select id="qType" onchange="toggleF()"><option value="open">פתוחה</option><option value="multiple">אמריקאית</option></select>
                <label><input type="checkbox" id="hasFlag" onchange="toggleF()"> יש Flag?</label>
                <textarea id="qText" placeholder="תוכן השאלה"></textarea>
                <div id="flagIn" class="hidden"><input id="qAns" placeholder="התשובה הנכונה"></div>
                <div id="optIn" class="hidden"><div id="ansList"></div><button onclick="addOpt()" style="width:auto">+ אופציה</button></div>
                <button onclick="saveQ()" style="width:100%; margin-top:15px;">שמור</button>
            </div>
        </div>

        <div id="gradeTab" class="tab-content hidden">
            <div id="listArea">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h3>הגשות חניכים</h3>
                    <div>
                        <button onclick="exportCSV()" style="background:var(--success); color:white">📥 אקסל</button>
                        <button onclick="clearAll()" style="background:var(--error); color:white">🗑️ איפוס</button>
                    </div>
                </div>
                <div id="grid"></div>
            </div>
            <div id="detArea" class="hidden">
                <button onclick="back()" style="background:#64748b; color:white; margin-bottom:15px;">⬅️ חזרה</button>
                <h2 id="detName"></h2>
                <div id="detCont"></div>
            </div>
        </div>

        <div id="setTab" class="tab-content hidden">
            <div class="card">
                <h3>שידור והגדרות</h3>
                <label>סוג מבחן:</label>
                <select id="gameMode">
                    <option value="quiz">📝 בוחן רגיל (מעבר חופשי)</option>
                    <option value="escape">🏃 חדר בריחה (ענישה 10 ש')</option>
                </select>
                <label>קטגוריה:</label>
                <select id="activeCat"></select>
                <button onclick="saveSet()" style="width:100%; background:var(--success); color:white; margin-top:15px;">🚀 הפעל שידור</button>
            </div>
            <div class="card">
                <input id="newCat" placeholder="שם קטגוריה">
                <button onclick="addCat()">הוסף</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    const PASS = "zigi2026";
    let subs = {};

    function login() {
        if(document.getElementById('adminPass').value === PASS) {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('adminContent').style.display = 'flex';
            init();
        }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
        if(id === 'gradeTab') loadSubs();
    }

    function toggleF() {
        const t = document.getElementById('qType').value, f = document.getElementById('hasFlag').checked;
        document.getElementById('flagIn').classList.toggle('hidden', !(t==='multiple' || f));
        document.getElementById('optIn').classList.toggle('hidden', t!=='multiple');
    }

    function addOpt() {
        const i = document.createElement('input'); i.className="o-i"; i.placeholder="אופציה";
        document.getElementById('ansList').appendChild(i);
    }

    async function init() {
        const r = await fetch(`${BASE_URL}categories.json`), cats = await r.json();
        ['qCat', 'activeCat'].forEach(id => {
            const s = document.getElementById(id); s.innerHTML = "";
            for(let k in cats) s.innerHTML += `<option value="${cats[k].name}">${cats[k].name}</option>`;
        });
    }

    async function saveQ() {
        const opts = Array.from(document.querySelectorAll('.o-i')).map(i=>i.value).filter(v=>v);
        const data = {
            category: document.getElementById('qCat').value,
            type: document.getElementById('qType').value,
            text: document.getElementById('qText').value,
            answer: document.getElementById('qAns').value.trim(),
            options: opts
        };
        await fetch(`${BASE_URL}questions.json`, { method:'POST', body:JSON.stringify(data) });
        location.reload();
    }

    async function loadSubs() {
        const r = await fetch(`${BASE_URL}submissions.json`); subs = await r.json() || {};
        const g = document.getElementById('grid'); g.innerHTML = "";
        const names = [...new Set(Object.values(subs).map(s => s.student))];
        names.forEach(n => {
            const my = Object.values(subs).filter(s => s.student === n);
            const ok = my.filter(s => s.isCorrect === true).length;
            const score = Math.round((ok/my.length)*100) || 0;
            const d = document.createElement('div'); d.className="student-row";
            d.innerHTML = `<span>👤 ${n}</span><span class="score-pill">${score}%</span>`;
            d.onclick = () => view(n); g.appendChild(d);
        });
    }

    function view(n) {
        document.getElementById('listArea').classList.add('hidden');
        document.getElementById('detArea').classList.remove('hidden');
        document.getElementById('detName').innerText = n;
        const c = document.getElementById('detCont'); c.innerHTML = "";
        Object.keys(subs).filter(id => subs[id].student === n).forEach(id => {
            const s = subs[id];
            const div = document.createElement('div'); div.className="exam-item";
            div.innerHTML = `<p><strong>${s.questionText}</strong></p><p>תשובה: ${s.userAnswer}</p>
                ${s.hasFlag ? `<p>${s.isCorrect ? '✅':'❌'}</p>` : `
                <button onclick="mark('${id}',true,'${n}')" style="background:var(--success); color:white;">נכון</button>
                <button onclick="mark('${id}',false,'${n}')" style="background:var(--error); color:white;">שגוי</button>`}`;
            c.appendChild(div);
        });
    }

    async function mark(id, v, n) {
        await fetch(`${BASE_URL}submissions/${id}/isCorrect.json`, { method:'PUT', body:JSON.stringify(v) });
        loadSubs().then(() => view(n));
    }

    function back() { document.getElementById('detArea').classList.add('hidden'); document.getElementById('listArea').classList.remove('hidden'); }

    async function saveSet() {
        const d = { gameMode: document.getElementById('gameMode').value, activeCategory: document.getElementById('activeCat').value };
        await fetch(`${BASE_URL}settings.json`, { method:'PUT', body:JSON.stringify(d) });
        alert("שודר!");
    }

    function exportCSV() {
        let c = "\uFEFFשם,ציון\n";
        const names = [...new Set(Object.values(subs).map(s=>s.student))];
        names.forEach(n => {
            const my = Object.values(subs).filter(s=>s.student===n);
            const score = Math.round((my.filter(s=>s.isCorrect===true).length/my.length)*100);
            c += `${n},${score}%\n`;
        });
        const b = new Blob([c], {type:'text/csv'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download="results.csv"; a.click();
    }

    async function clearAll() { if(confirm("למחוק הכל?")) { await fetch(`${BASE_URL}submissions.json`, {method:'DELETE'}); location.reload(); } }

    async function addCat() {
        const n = document.getElementById('newCat').value;
        await fetch(`${BASE_URL}categories.json`, { method:'POST', body:JSON.stringify({name:n}) });
        location.reload();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CyberQuest Admin - Ultra Wide & Spaced</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --sidebar-bg: #1e293b; --card-bg: #1e293b; 
            --accent: #38bdf8; --text: #f1f5f9; --error: #ef4444; --success: #10b981; 
        }
        
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; width: 100%; background: var(--bg); color: var(--text); overflow-x: hidden; }
        body { font-family: 'Assistant', sans-serif; display: flex; }
        
        /* מסך כניסה */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--sidebar-bg); padding: 50px; border-radius: 20px; text-align: center; border: 1px solid var(--accent); width: 450px; box-shadow: 0 0 50px rgba(56, 189, 248, 0.1); }

        /* סיידבר רחב */
        .sidebar { width: 280px; background: var(--sidebar-bg); padding: 25px; position: fixed; height: 100vh; border-left: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .sidebar h2 { font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 30px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        /* תוכן ראשי - פריסה מקסימלית */
        .main { margin-right: 280px; width: calc(100% - 280px); min-height: 100vh; padding: 40px; display: flex; flex-direction: column; }
        
        .card { background: var(--card-bg); padding: 35px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; width: 100%; }
        
        .tab-btn { display: block; width: 100%; padding: 20px; margin-bottom: 12px; border: none; background: rgba(255,255,255,0.02); color: #94a3b8; text-align: right; cursor: pointer; border-radius: 10px; font-weight: 600; font-size: 1.1rem; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: var(--bg); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: white; }
        
        input, select, textarea { width: 100%; padding: 16px; margin: 12px 0; border: 1px solid #334155; border-radius: 10px; background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; transition: 0.2s; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.5); }
        
        /* כפתורים עם ריווח */
        button { background: var(--accent); color: var(--bg); border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: 0.2s; margin: 5px; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        /* רשימות - ריווח מקסימלי בין טקסט לכפתור */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); width: 100%; transition: 0.2s; border-radius: 10px; }
        .list-item:hover { background: rgba(255,255,255,0.03); }
        
        .item-info { display: flex; align-items: center; gap: 25px; flex-grow: 1; padding-left: 20px; }
        .q-num { background: var(--accent); color: var(--bg); padding: 6px 14px; border-radius: 8px; font-weight: 800; font-family: 'Fira Code', monospace; font-size: 1.1rem; flex-shrink: 0; }
        .item-text { font-size: 1.2rem; line-height: 1.4; }
        
        /* קטגוריות בפריסה רחבה */
        .cat-checkboxes { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 25px; border: 1px solid #334155; border-radius: 12px; margin: 20px 0; background: rgba(0,0,0,0.2); }
        .cat-checkboxes label { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .cat-checkboxes label:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        .cat-checkboxes input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; margin: 0; }

        .hidden { display: none !important; }
        .btn-danger { background: var(--error); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        .opt-row { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 10px; }
        .opt-row input[type="radio"] { width: 25px; height: 25px; flex-shrink: 0; cursor: pointer; }
        
        h3 { font-size: 1.8rem; margin-bottom: 30px; color: var(--accent); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color:var(--accent); font-size: 2.5rem; margin-bottom: 5px;">CYBERQUEST</h1>
        <p style="opacity:0.6; margin-bottom: 30px;">ADMINISTRATION SYSTEM v4.0</p>
        <input type="password" id="passInput" placeholder="הכנס סיסמת מנהל" onkeypress="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()" style="width: 100%; margin-top: 20px; font-size: 1.2rem; padding: 18px;">כניסה למערכת</button>
    </div>
</div>

<div id="adminPanel" class="hidden">
    <div class="sidebar">
        <h2 style="color:var(--accent); text-align:center;">לוח בקרה</h2>
        <button class="tab-btn active" onclick="showTab('qAddTab', this)">➕ הוספת שאלה</button>
        <button class="tab-btn" onclick="showTab('manageQsTab', this)">📝 ניהול שאלות</button>
        <button class="tab-btn" onclick="showTab('catTab', this)">📂 ניהול קטגוריות</button>
        <button class="tab-btn" onclick="showTab('gradeTab', this)">📊 ציונים והגשות</button>
        <button class="tab-btn" onclick="showTab('setTab', this)">🚀 שידור חי</button>
    </div>

    <div class="main">
        <div id="qAddTab" class="tab-content">
            <div class="card">
                <h3>יצירת שאלה חדשה</h3>
                <label>בחירת קטגוריות לשיוך:</label>
                <div id="newQ-cats" class="cat-checkboxes"></div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                    <div>
                        <label>סוג המענה:</label>
                        <select id="qType" onchange="toggleAnsForm('new')">
                            <option value="open">שאלה פתוחה (Flag)</option>
                            <option value="multiple">שאלה אמריקאית (בחירה מרשימה)</option>
                        </select>
                    </div>
                    <div style="display:flex; align-items:center; padding-top:35px;">
                        <label style="cursor:pointer; font-size: 1.1rem;"><input type="checkbox" id="hasFlag" checked onchange="toggleAnsForm('new')" style="width:22px; height:22px; vertical-align:middle; margin-left:10px;"> בדיקה אוטומטית ע"י המערכת</label>
                    </div>
                </div>

                <label style="display:block; margin-top:20px;">תוכן השאלה / האתגר:</label>
                <textarea id="qText" placeholder="הקלד כאן את השאלה..." rows="6"></textarea>
                
                <div id="openAnsArea">
                    <label>התשובה הנכונה (Flag):</label>
                    <input id="qAns" placeholder="הזן את ה-Flag המדויק">
                </div>
                
                <div id="multiAnsArea" class="hidden">
                    <label>אפשרויות תשובה (סמן את הנכונה):</label>
                    <div id="optsContainer"></div>
                    <button type="button" onclick="addOptRow('optsContainer')" class="btn-outline" style="margin-top:15px;">+ הוסף תשובה אפשרית</button>
                </div>
                
                <button onclick="saveNewQ()" class="btn-success" style="width:100%; margin-top:40px; font-size:1.3rem; padding: 22px;">שמור שאלה במאגר</button>
            </div>
        </div>

        <div id="manageQsTab" class="tab-content hidden">
            <div class="card">
                <h3>ניהול מאגר השאלות</h3>
                <div id="qsList"></div>
            </div>
        </div>

        <div id="editQTab" class="tab-content hidden">
            <div class="card">
                <button onclick="showTab('manageQsTab')" class="btn-outline" style="margin-bottom:30px;">⬅️ חזרה לרשימת השאלות</button>
                <h3>עריכת נתוני שאלה</h3>
                <input id="editQId" type="hidden">
                <label>קטגוריות משויכות:</label>
                <div id="editQ-cats" class="cat-checkboxes"></div>
                <label>תוכן השאלה:</label>
                <textarea id="editQText" rows="7"></textarea>
                <div id="editQ-ansArea"></div>
                <button onclick="updateQ()" class="btn-success" style="width:100%; margin-top:30px; padding: 20px; font-size: 1.2rem;">עדכן נתונים</button>
            </div>
        </div>

        <div id="catTab" class="tab-content hidden">
            <div class="card">
                <h3>ניהול קטגוריות</h3>
                <div id="catsList"></div>
                
                <div class="card" style="margin-top:40px; background: rgba(0,0,0,0.3); border: 1px dashed var(--accent);">
                    <h4 style="margin-top:0;">הוספת קטגוריה חדשה</h4>
                    <div style="display:flex; gap:20px;">
                        <input id="newCatName" placeholder="שם הקטגוריה (למשל: תקשורת, קריפטוגרפיה...)">
                        <button onclick="addCategory()" style="flex-shrink:0; padding: 0 40px;">הוסף</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="editCatTab" class="tab-content hidden">
            <div class="card">
                <button onclick="showTab('catTab')" class="btn-outline">⬅️ חזרה לקטגוריות</button>
                <h3 id="editCatTitle"></h3>
                <div id="catQsPreview"></div>
            </div>
        </div>

        <div id="gradeTab" class="tab-content hidden">
            <div class="card" id="listArea">
                <h3>מעקב הגשות חניכים</h3>
                <div id="studentsGrid"></div>
            </div>
            <div class="card hidden" id="detailArea">
                <button onclick="backToList()" class="btn-outline">⬅️ חזרה לרשימה</button>
                <h2 id="detName" style="margin: 30px 0; color: var(--accent);"></h2>
                <div id="detContent"></div>
            </div>
        </div>

        <div id="setTab" class="tab-content hidden">
            <div class="card">
                <h3>ניהול שידור והפעלת אירוע</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:40px;">
                    <div>
                        <label>בחר קטגוריה לשידור חי:</label>
                        <select id="activeCatSelect"></select>
                    </div>
                    <div>
                        <label>מצב המשחק:</label>
                        <select id="gameMode">
                            <option value="quiz">מצב בוחן (חופשי)</option>
                            <option value="escape">מצב חדר בריחה (נעילה בטעות)</option>
                        </select>
                    </div>
                </div>
                <button onclick="broadcast()" class="btn-success" style="width:100%; margin-top:40px; font-size:1.5rem; padding: 25px;">🚀 הפעל שידור לחניכים</button>
            </div>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    let cats = {}, qsts = {}, subs = {};

    function checkPass() {
        if(document.getElementById('passInput').value === 'zigi2026') {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            refreshData();
        } else alert("גישה נדחתה");
    }

    async function refreshData() {
        const [rC, rQ] = await Promise.all([fetch(`${DB_URL}categories.json`), fetch(`${DB_URL}questions.json`)]);
        cats = await rC.json() || {};
        qsts = await rQ.json() || {};
        updateSelectors();
        renderQs();
        renderCats();
    }

    function updateSelectors() {
        const catBox = document.getElementById('newQ-cats');
        const sel = document.getElementById('activeCatSelect');
        catBox.innerHTML = ""; sel.innerHTML = "";
        for(let id in cats) {
            catBox.innerHTML += `<label><input type="checkbox" value="${id}"> <span>${cats[id].name}</span></label>`;
            sel.innerHTML += `<option value="${id}">${cats[id].name}</option>`;
        }
    }

    function addOptRow(contId, val='', isCorrect=false) {
        const div = document.createElement('div'); div.className = "opt-row";
        div.innerHTML = `<input type="radio" name="correct" ${isCorrect?'checked':''}> 
                         <input type="text" class="opt-text" value="${val}" style="margin:0" placeholder="הזן תשובה אפשרית">`;
        document.getElementById(contId).appendChild(div);
    }

    function toggleAnsForm(mode, typeVal) {
        const type = typeVal || document.getElementById('qType').value;
        const hasFlag = document.getElementById('hasFlag').checked;
        document.getElementById('openAnsArea').classList.toggle('hidden', type==='multiple' || !hasFlag);
        document.getElementById('multiAnsArea').classList.toggle('hidden', type!=='multiple');
        if(type==='multiple' && document.getElementById('optsContainer').children.length === 0) {
            for(let i=0; i<3; i++) addOptRow('optsContainer');
        }
    }

    async function saveNewQ() {
        const selected = Array.from(document.querySelectorAll('#newQ-cats input:checked')).map(i => i.value);
        const type = document.getElementById('qType').value;
        let ans = "", opts = null, hasFlag = document.getElementById('hasFlag').checked;

        if(type==='multiple') {
            hasFlag = true; opts = [];
            document.querySelectorAll('#optsContainer .opt-row').forEach(row => {
                const txt = row.querySelector('.opt-text').value;
                if(txt) { opts.push(txt); if(row.querySelector('input').checked) ans = txt; }
            });
        } else ans = hasFlag ? document.getElementById('qAns').value : "";

        await fetch(`${DB_URL}questions.json`, { method: 'POST', body: JSON.stringify({
            text: document.getElementById('qText').value, type, answer: ans, options: opts, hasFlag, categoryIds: selected
        })});
        refreshData(); showTab('manageQsTab');
    }

    function renderQs() {
        const list = document.getElementById('qsList'); list.innerHTML = "";
        let count = 1;
        for(let id in qsts) {
            const q = qsts[id];
            const div = document.createElement('div'); div.className = "list-item";
            div.innerHTML = `
                <div class="item-info">
                    <span class="q-num">${count++}</span> 
                    <span class="item-text">${q.text.substring(0,120)}${q.text.length > 120 ? '...' : ''}</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button onclick="openEditQ('${id}')" class="btn-outline">עריכה</button>
                    <button onclick="deleteQ('${id}')" class="btn-danger">מחיקה</button>
                </div>`;
            list.appendChild(div);
        }
    }

    function openEditQ(id) {
        const q = qsts[id];
        document.getElementById('editQId').value = id;
        document.getElementById('editQText').value = q.text;
        showTab('editQTab');
        
        const catArea = document.getElementById('editQ-cats'); catArea.innerHTML = "";
        for(let cId in cats) {
            const isChecked = (q.categoryIds || []).includes(cId) ? 'checked' : '';
            catArea.innerHTML += `<label><input type="checkbox" value="${cId}" ${isChecked}> <span>${cats[cId].name}</span></label>`;
        }

        const ansArea = document.getElementById('editQ-ansArea'); ansArea.innerHTML = "";
        if(q.type === 'multiple') {
            ansArea.innerHTML = `<div id="editOpts" style="margin-top:20px;"></div><button onclick="addOptRow('editOpts')" class="btn-outline">+ הוסף אפשרות</button>`;
            q.options.forEach(opt => addOptRow('editOpts', opt, opt === q.answer));
        } else {
            ansArea.innerHTML = `<div style="margin-top:20px;"><label><input type="checkbox" id="editHasFlag" ${q.hasFlag?'checked':''}> בדיקה אוטומטית</label>
                                 <input id="editAns" value="${q.answer || ''}" placeholder="תשובה נכונה"></div>`;
        }
    }

    async function updateQ() {
        const id = document.getElementById('editQId').value;
        const catIds = Array.from(document.querySelectorAll('#editQ-cats input:checked')).map(i => i.value);
        const q = qsts[id];
        let ans = q.answer, opts = q.options, hasFlag = q.hasFlag;

        if(q.type === 'multiple') {
            opts = [];
            document.querySelectorAll('#editOpts .opt-row').forEach(row => {
                const txt = row.querySelector('.opt-text').value;
                if(txt) { opts.push(txt); if(row.querySelector('input').checked) ans = txt; }
            });
        } else {
            hasFlag = document.getElementById('editHasFlag').checked;
            ans = hasFlag ? document.getElementById('editAns').value : "";
        }

        await fetch(`${DB_URL}questions/${id}.json`, { method: 'PUT', body: JSON.stringify({ ...q, text: document.getElementById('editQText').value, categoryIds: catIds, answer: ans, options: opts, hasFlag }) });
        refreshData(); showTab('manageQsTab');
    }

    async function deleteQ(id) { if(confirm("למחוק שאלה זו?")) { await fetch(`${DB_URL}questions/${id}.json`, {method:'DELETE'}); refreshData(); } }

    function renderCats() {
        const list = document.getElementById('catsList'); list.innerHTML = "";
        for(let id in cats) {
            list.innerHTML += `
                <div class="list-item">
                    <span style="font-size:1.4rem; font-weight:600;">📁 ${cats[id].name}</span>
                    <div style="display:flex; gap:10px;">
                        <button onclick="viewCatDetails('${id}')" class="btn-outline">שאלות בקטגוריה</button>
                        <button onclick="deleteCat('${id}')" class="btn-danger">מחיקה</button>
                    </div>
                </div>`;
        }
    }

    function viewCatDetails(id) {
        document.getElementById('editCatTitle').innerText = `שאלות המשויכות ל: ${cats[id].name}`;
        const preview = document.getElementById('catQsPreview'); preview.innerHTML = "";
        let c = 1;
        for(let qId in qsts) {
            if((qsts[qId].categoryIds || []).includes(id)) {
                preview.innerHTML += `
                    <div class="list-item">
                        <span style="font-size:1.1rem;">${c++}. ${qsts[qId].text}</span>
                        <span style="color:var(--accent); font-family:'Fira Code'; font-weight:bold;">[${qsts[qId].answer}]</span>
                    </div>`;
            }
        }
        showTab('editCatTab');
    }

    async function addCategory() {
        const name = document.getElementById('newCatName').value;
        if(name) { await fetch(`${DB_URL}categories.json`, { method: 'POST', body: JSON.stringify({name}) }); document.getElementById('newCatName').value=""; refreshData(); }
    }

    async function deleteCat(id) { if(confirm("למחוק קטגוריה זו?")) { await fetch(`${DB_URL}categories/${id}.json`, {method:'DELETE'}); refreshData(); } }

    async function broadcast() {
        const cId = document.getElementById('activeCatSelect').value;
        if(!cId) return alert("בחר קטגוריה תחילה");
        await fetch(`${DB_URL}settings.json`, { method: 'PUT', body: JSON.stringify({
            gameMode: document.getElementById('gameMode').value, activeCategoryId: cId, activeCategoryName: cats[cId].name
        })});
        alert("השידור הופעל! החניכים יכולים להתחיל.");
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        if(btn) btn.classList.add('active');
        if(id === 'gradeTab') loadGrades();
    }

    async function loadGrades() {
        const r = await fetch(`${DB_URL}submissions.json`); subs = await r.json() || {};
        const grid = document.getElementById('studentsGrid'); grid.innerHTML = "";
        const names = [...new Set(Object.values(subs).map(s => s.student))];
        names.forEach(n => {
            grid.innerHTML += `
                <div class="list-item" onclick="viewStudent('${n}')" style="cursor:pointer">
                    <span style="font-size:1.3rem;">👤 <strong>${n}</strong></span>
                    <button class="btn-success">צפה בהגשות</button>
                </div>`;
        });
    }

    function viewStudent(name) {
        document.getElementById('listArea').classList.add('hidden');
        document.getElementById('detailArea').classList.remove('hidden');
        document.getElementById('detName').innerText = `ציונים עבור: ${name}`;
        const cont = document.getElementById('detContent'); cont.innerHTML = "";
        Object.keys(subs).filter(id => subs[id].student === name).forEach(id => {
            const s = subs[id];
            cont.innerHTML += `
                <div class="card" style="border-right: 8px solid ${s.isCorrect ? 'var(--success)' : (s.isCorrect === false ? 'var(--error)' : '#94a3b8')}">
                    <p style="font-size:1.2rem; margin-bottom:15px;"><strong>${s.questionText}</strong></p>
                    <p>תשובה שנשלחה: <span style="color:var(--accent); font-family:'Fira Code'; font-weight:bold; font-size:1.1rem;">${s.userAnswer}</span></p>
                    <p style="margin-top:10px;">סטטוס: ${s.isCorrect ? '✅ נכון' : (s.isCorrect === false ? '❌ שגוי' : '⏳ ממתין לבדיקה')}</p>
                    <div class="${s.hasFlag ? 'hidden' : ''}" style="margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:15px;">
                        <button onclick="markManual('${id}', true, '${name}')" class="btn-success">סמן כנכון</button>
                        <button onclick="markManual('${id}', false, '${name}')" class="btn-danger">סמן כשגוי</button>
                    </div>
                </div>`;
        });
    }

    async function markManual(id, val, name) {
        await fetch(`${DB_URL}submissions/${id}/isCorrect.json`, { method: 'PUT', body: JSON.stringify(val) });
        loadGrades().then(() => viewStudent(name));
    }

    function backToList() { document.getElementById('detailArea').classList.add('hidden'); document.getElementById('listArea').classList.remove('hidden'); }
</script>
</body>
</html>

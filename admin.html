<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>CyberQuest Admin - המערכת המלאה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #1e293b; --main-bg: #f8fafc; --accent: #38bdf8; --error: #ef4444; --success: #10b981; }
        body { font-family: 'Assistant', sans-serif; margin: 0; display: flex; background: var(--main-bg); min-height: 100vh; overflow-x: hidden; }
        
        #loginArea { position: fixed; inset: 0; background: #1e293b; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #adminContent { display: none; width: 100%; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 20px; position: fixed; height: 100vh; }
        .main-panel { margin-right: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .tab-btn { display: block; width: 100%; padding: 15px; margin-bottom: 8px; border: none; background: none; color: #94a3b8; text-align: right; cursor: pointer; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: var(--sidebar-bg); font-weight: bold; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        button { background: var(--accent); color: var(--sidebar-bg); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { text-align: right; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .score-v { color: var(--success); font-weight: bold; }
        .score-x { color: var(--error); font-weight: bold; }
        .opt-input { background: #f1f5f9; border-style: dashed; margin-bottom: 5px; }
        .cat-tag { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="login-card">
        <h2>כניסת מנהלת</h2>
        <input type="password" id="adminPass" placeholder="סיסמת ניהול">
        <p id="errorMsg" style="color: var(--error); display: none;">סיסמה שגויה!</p>
        <button onclick="login()">כניסה למערכת</button>
    </div>
</div>

<div id="adminContent">
    <div class="sidebar">
        <h2 style="color: var(--accent); margin-bottom: 30px;">CyberQuest Admin</h2>
        <button class="tab-btn active" onclick="showTab('qTab', this)">📚 ניהול שאלות</button>
        <button class="tab-btn" onclick="showTab('gradingTab', this)">🎓 ציוני חניכים</button>
        <button class="tab-btn" onclick="showTab('settingsTab', this)">⚙️ הגדרות ושידור</button>
    </div>

    <div class="main-panel">
        <div id="qTab" class="tab-content">
            <div class="card">
                <h2>➕ הוספת שאלה חדשה</h2>
                <select id="qCatSelect"></select>
                <select id="qType" onchange="toggleOptions()">
                    <option value="open">שאלה פתוחה (Flag)</option>
                    <option value="multiple">שאלה אמריקאית</option>
                </select>
                <textarea id="qText" placeholder="תוכן השאלה..."></textarea>
                
                <div id="optArea" class="hidden">
                    <p style="font-size: 0.9rem; color: #64748b;">הוסיפי את האופציות לשאלה האמריקאית:</p>
                    <div id="ansList"></div>
                    <button onclick="addOptionField()" style="background:#e2e8f0; color:#475569; width:auto; margin-bottom:10px;">+ הוסף אופציה</button>
                </div>

                <input id="qAns" placeholder="התשובה הנכונה">
                <button onclick="saveQuestion()">שמור שאלה במאגר</button>
            </div>
            
            <div class="card">
                <h2>🔍 מאגר שאלות</h2>
                <select id="filterCat" onchange="loadQuestions()"><option value="all">כל הקטגוריות</option></select>
                <table>
                    <thead><tr><th>קטגוריה</th><th>שאלה</th><th>תשובה</th><th>פעולות</th></tr></thead>
                    <tbody id="qTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="gradingTab" class="tab-content hidden">
            <div class="card">
                <h2>📊 תשובות חניכים ובדיקה</h2>
                <table>
                    <thead><tr><th>חניך</th><th>שאלה</th><th>תשובה</th><th>תוצאה</th><th>ניקוד</th></tr></thead>
                    <tbody id="subTable"></tbody>
                </table>
            </div>
        </div>

        <div id="settingsTab" class="tab-content hidden">
            <div class="card" style="border: 2px solid var(--success);">
                <h2>📺 שידור לחניכים</h2>
                <select id="activeCatSelect"></select>
                <button onclick="setActive()" style="background: var(--success); color: white;">🚀 הפעל קטגוריה לחניכים</button>
            </div>
            <div class="card">
                <h2>📁 ניהול קטגוריות</h2>
                <input id="newCatName" placeholder="שם קטגוריה">
                <button onclick="addCat()">הוסף קטגוריה</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/"; 
    const PASS = "zigi2026";

    function login() {
        if (document.getElementById('adminPass').value === PASS) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminContent').style.display = 'flex';
            loadAll();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        btn.classList.add('active');
        if(id === 'gradingTab') loadSubmissions();
    }

    function toggleOptions() {
        const isMultiple = document.getElementById('qType').value === 'multiple';
        document.getElementById('optArea').classList.toggle('hidden', !isMultiple);
        if(isMultiple && document.getElementById('ansList').children.length === 0) {
            addOptionField(); addOptionField();
        }
    }

    function addOptionField() {
        const i = document.createElement('input');
        i.className = "opt-input";
        i.placeholder = "אופציה...";
        document.getElementById('ansList').appendChild(i);
    }

    async function loadAll() {
        try {
            const res = await fetch(`${BASE_URL}categories.json`);
            const data = await res.json();
            ['qCatSelect', 'activeCatSelect', 'filterCat'].forEach(sId => {
                const s = document.getElementById(sId);
                s.innerHTML = sId === 'filterCat' ? '<option value="all">כל הקטגוריות</option>' : '<option value="">בחרי קטגוריה...</option>';
                for(let id in data) s.innerHTML += `<option value="${data[id].name}">${data[id].name}</option>`;
            });
            loadQuestions();
        } catch(e) { console.error(e); }
    }

    async function saveQuestion() {
        const opts = Array.from(document.querySelectorAll('.opt-input')).map(i => i.value).filter(v => v !== "");
        const data = {
            category: document.getElementById('qCatSelect').value,
            type: document.getElementById('qType').value,
            text: document.getElementById('qText').value,
            answer: document.getElementById('qAns').value.trim(),
            options: opts
        };
        if(!data.category || !data.text) return alert("מלאי שדות חובה");
        await fetch(`${BASE_URL}questions.json`, { method: 'POST', body: JSON.stringify(data) });
        alert("השאלה נשמרה!");
        document.getElementById('qText').value = "";
        document.getElementById('qAns').value = "";
        document.getElementById('ansList').innerHTML = "";
        loadQuestions();
    }

    async function loadQuestions() {
        const res = await fetch(`${BASE_URL}questions.json`);
        const data = await res.json();
        const filter = document.getElementById('filterCat').value;
        const tbody = document.getElementById('qTableBody');
        tbody.innerHTML = "";
        for(let id in data) {
            if(filter !== 'all' && data[id].category !== filter) continue;
            tbody.innerHTML += `<tr><td><span class="cat-tag">${data[id].category}</span></td><td>${data[id].text}</td><td>${data[id].answer}</td><td><button onclick="del('questions/${id}')" style="background:red; color:white; width:auto; padding:5px 10px; margin:0;">מחק</button></td></tr>`;
        }
    }

    async function loadSubmissions() {
        const res = await fetch(`${BASE_URL}submissions.json`);
        const data = await res.json();
        const tbody = document.getElementById('subTable');
        tbody.innerHTML = "";
        for(let id in data) {
            const s = data[id];
            tbody.innerHTML += `<tr><td>${s.student}</td><td>${(s.questionText || "שאלה").substring(0,20)}...</td><td>${s.userAnswer}</td><td class="${s.isCorrect?'score-v':'score-x'}">${s.isCorrect?'נכון':'שגוי'}</td><td><input type="number" value="${s.score||''}" onchange="setScore('${id}', this.value)" style="width:60px; margin:0;"></td></tr>`;
        }
    }

    async function setScore(id, val) { await fetch(`${BASE_URL}submissions/${id}/score.json`, { method: 'PUT', body: JSON.stringify(val) }); }
    async function setActive() { const cat = document.getElementById('activeCatSelect').value; await fetch(`${BASE_URL}settings.json`, { method: 'PUT', body: JSON.stringify({activeCategory: cat}) }); alert("הקטגוריה " + cat + " שודרה!"); }
    async function addCat() { await fetch(`${BASE_URL}categories.json`, { method: 'POST', body: JSON.stringify({name: document.getElementById('newCatName').value}) }); loadAll(); }
    async function del(path) { if(confirm('למחוק?')) { await fetch(`${BASE_URL}${path}.json`, { method: 'DELETE' }); loadQuestions(); } }
</script>
</body>
</html>

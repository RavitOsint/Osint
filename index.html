<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Terminal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --accent-color: #38bdf8; 
            --text-color: #f1f5f9; 
            --error-color: #ef4444; 
            --success-color: #10b981;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Assistant', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        .terminal-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            animation: fadeIn 0.6s ease;
        }

        .terminal-header { 
            background: rgba(0,0,0,0.2); 
            padding: 12px; 
            display: flex; 
            gap: 8px; 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        .content { padding: 30px; text-align: center; }

        h2, h3 { color: var(--accent-color); margin-top: 0; }
        p { font-family: 'Fira Code', monospace; line-height: 1.6; }

        input { 
            width: 100%; 
            padding: 12px; 
            background: rgba(0,0,0,0.3); 
            border: 2px solid #334155; 
            border-radius: 8px; 
            color: white; 
            font-family: 'Fira Code', monospace; 
            text-align: center; 
            margin: 15px 0; 
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--accent-color); }

        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--accent-color); 
            color: var(--bg-color); 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .option-btn { 
            background: #334155; 
            color: white; 
            border: 1px solid #475569; 
            text-align: right; 
            margin-bottom: 10px; 
            font-family: 'Assistant', sans-serif;
        }

        .status { margin-top: 20px; font-weight: bold; min-height: 20px; }
        #timer { font-size: 1.8em; color: var(--error-color); font-family: 'Fira Code', monospace; margin-top: 10px; }
        
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="terminal-card">
        <div class="terminal-header">
            <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        </div>
        <div class="content">
            
            <div id="loginArea">
                <h2>Access Portal</h2>
                <p>Enter Student Credentials</p>
                <input type="text" id="studentName" placeholder="שם מלא של החניך" autocomplete="off">
                <button onclick="startSession()">התחברות למערכת</button>
            </div>

            <div id="waitArea" class="hidden">
                <h3 id="catNameDisplay">ממתין לשידור...</h3>
                <p>המרצה טרם הפעילה את האתגר.</p>
            </div>

            <div id="challengeArea" class="hidden">
                <h3 id="currentCat" style="font-size: 0.9em; opacity: 0.8;"></h3>
                <p id="questionText"></p>
                
                <div id="multipleChoiceArea"></div>
                
                <div id="openAnswerArea" class="hidden">
                    <input type="text" id="userInp" placeholder="הקלד תשובה כאן..." autocomplete="off">
                    <button id="submitBtn" onclick="sendResponse()">שלח פקודה</button>
                </div>

                <div id="feedbackMsg" class="status"></div>
                <div id="timerDisplay"></div>
            </div>

            <div id="finishArea" class="hidden">
                <h2 style="color: var(--success-color)">MISSION COMPLETE</h2>
                <p>כל הנתונים הועלו בהצלחה לשרת המרכזי.</p>
                <button onclick="location.reload()" style="background: #475569; color: white; margin-top: 20px;">חזרה להתחלה</button>
            </div>

        </div>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    let student = "", questions = [], currentIndex = 0, mode = "quiz", isLocked = false;

    async function startSession() {
        student = document.getElementById('studentName').value.trim();
        if (!student) return;
        
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('waitArea').classList.remove('hidden');
        
        // התחלת סנכרון מול השרת
        syncWithAdmin();
        setInterval(syncWithAdmin, 4000);
    }

    async function syncWithAdmin() {
        try {
            const sRes = await fetch(`${FIREBASE_URL}settings.json`);
            const settings = await sRes.json();
            if (!settings || !settings.activeCategoryId) return;

            mode = settings.gameMode;

            // טעינת שאלות רק אם הן עוד לא נטענו או שהקטגוריה השתנתה
            if (questions.length === 0) {
                const qRes = await fetch(`${FIREBASE_URL}questions.json`);
                const allQs = await qRes.json();
                
                // סינון שאלות שמשויכות למזהה הקטגוריה שהמורה בחרה
                questions = Object.values(allQs || {}).filter(q => 
                    q.categoryIds && q.categoryIds.includes(settings.activeCategoryId)
                );

                if (questions.length > 0) {
                    document.getElementById('catNameDisplay').innerText = settings.activeCategoryName;
                    document.getElementById('currentCat').innerText = settings.activeCategoryName;
                    renderQuestion();
                }
            }
        } catch (e) { console.error("Sync Error", e); }
    }

    function renderQuestion() {
        if (currentIndex >= questions.length) {
            document.getElementById('challengeArea').classList.add('hidden');
            document.getElementById('waitArea').classList.add('hidden');
            document.getElementById('finishArea').classList.remove('hidden');
            return;
        }

        document.getElementById('waitArea').classList.add('hidden');
        document.getElementById('challengeArea').classList.remove('hidden');
        
        const q = questions[currentIndex];
        document.getElementById('questionText').innerText = q.text;
        document.getElementById('feedbackMsg').innerText = `שלב ${currentIndex + 1} מתוך ${questions.length}`;
        
        const multiArea = document.getElementById('multipleChoiceArea');
        const openArea = document.getElementById('openAnswerArea');
        multiArea.innerHTML = "";

        if (q.type === 'multiple') {
            openArea.classList.add('hidden');
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => sendResponse(opt);
                multiArea.appendChild(btn);
            });
        } else {
            openArea.classList.remove('hidden');
            document.getElementById('userInp').value = "";
        }
    }

    async function sendResponse(providedValue) {
        if (isLocked) return;
        
        const q = questions[currentIndex];
        const val = providedValue || document.getElementById('userInp').value.trim();
        if (!val) return;

        const isCorrect = (q.answer && val.toLowerCase() === q.answer.toLowerCase());

        // לוגיקת חדר בריחה (Escape Room) - ענישה על טעות רק אם יש Flag
        if (mode === 'escape' && q.hasFlag && !isCorrect) {
            applyPenalty();
            return;
        }

        // שמירה לשרת
        const submission = {
            student: student,
            questionText: q.text,
            userAnswer: val,
            hasFlag: q.hasFlag,
            isCorrect: q.hasFlag ? isCorrect : null,
            timestamp: new Date().toISOString()
        };

        await fetch(`${FIREBASE_URL}submissions.json`, { 
            method: 'POST', 
            body: JSON.stringify(submission) 
        });

        currentIndex++;
        renderQuestion();
    }

    function applyPenalty() {
        isLocked = true;
        let timeLeft = 10;
        const msg = document.getElementById('feedbackMsg');
        const timer = document.getElementById('timerDisplay');
        
        msg.style.color = "var(--error-color)";
        msg.innerText = "זוהתה פריצה לא מורשית! נועל מערכת...";
        
        const countdown = setInterval(() => {
            timer.innerText = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(countdown);
                timer.innerText = "";
                msg.innerText = "";
                isLocked = false;
            }
        }, 1000);
    }
</script>

</body>
</html>

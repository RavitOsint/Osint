<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --error: #ef4444; --success: #22c55e; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; text-align: center; }
        .card { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 1rem; outline: none; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .timer-msg { color: var(--error); font-weight: bold; margin: 15px 0; padding: 10px; border: 1px solid var(--error); border-radius: 8px; background: rgba(239, 68, 68, 0.1); }
        .hidden { display: none !important; }
        .option-btn { background: #334155; color: white; margin: 8px 0; text-align: right; border: 1px solid #475569; }
        .progress { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="card">
        <h1>CyberQuest</h1>
        <input type="text" id="studentName" placeholder="הכנס שם מלא">
        <button onclick="startApp()">התחל</button>
    </div>

    <div id="waitScreen" class="card hidden">
        <h2>ממתין לשידור קטגוריה...</h2>
    </div>

    <div id="questionScreen" class="card hidden">
        <div id="progress" class="progress"></div>
        <h2 id="questionTitle"></h2>
        
        <div id="punishmentArea" class="timer-msg hidden">תשובה שגויה! המתן <span id="seconds">10</span> שניות...</div>
        
        <div id="ansArea"></div>
        <div id="openAnsArea" class="hidden">
            <input type="text" id="openAnswer" placeholder="הקלד תשובה...">
            <button id="sendBtn" onclick="submitOpen()">שלח</button>
        </div>
    </div>

    <div id="finishScreen" class="card hidden">
        <h1>סיימת בהצלחה! 🏆</h1>
        <p>התשובות הועברו לבדיקה.</p>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    let studentName = "", currentQuestions = [], currentIndex = 0, gameMode = "quiz", isWaiting = false;

    async function startApp() {
        studentName = document.getElementById('studentName').value.trim();
        if (!studentName) return alert("שם בבקשה");
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('waitScreen').classList.remove('hidden');
        sync(); setInterval(sync, 4000);
    }

    async function sync() {
        const res = await fetch(`${BASE_URL}settings.json`);
        const settings = await res.json();
        if (!settings) return;
        gameMode = settings.gameMode || "quiz";
        
        if (settings.activeCategory && currentQuestions.length === 0) {
            const qRes = await fetch(`${BASE_URL}questions.json`);
            const all = await qRes.json();
            currentQuestions = Object.values(all || {}).filter(q => q.category === settings.activeCategory);
            if(currentQuestions.length > 0) showQuestion();
        }
    }

    function showQuestion() {
        if (currentIndex >= currentQuestions.length) {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('finishScreen').classList.remove('hidden');
            return;
        }
        document.getElementById('waitScreen').classList.add('hidden');
        document.getElementById('questionScreen').classList.remove('hidden');
        
        const q = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `שאלה ${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('questionTitle').innerText = q.text;
        
        const ansArea = document.getElementById('ansArea');
        const openArea = document.getElementById('openAnsArea');
        ansArea.innerHTML = "";
        
        if (q.type === 'multiple') {
            openArea.classList.add('hidden');
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                ansArea.appendChild(btn);
            });
        } else {
            openArea.classList.remove('hidden');
            document.getElementById('openAnswer').value = "";
        }
    }

    async function checkAnswer(userAns) {
        if (isWaiting) return;
        const q = currentQuestions[currentIndex];
        const isCorrect = (q.answer && userAns.trim().toLowerCase() === q.answer.trim().toLowerCase());

        // לוגיקה קריטית:
        if (gameMode === 'escape') {
            if (q.answer && !isCorrect) {
                startPunishment(); // עונש ונשארים באותה שאלה
                return;
            }
        } 
        
        // אם הגענו לכאן: זה או בוחן (עוברים תמיד) או חדר בריחה והצלחנו
        await saveSubmission(q, userAns, isCorrect);
        currentIndex++;
        showQuestion();
    }

    function submitOpen() { checkAnswer(document.getElementById('openAnswer').value); }

    function startPunishment() {
        isWaiting = true;
        const area = document.getElementById('punishmentArea');
        const btn = document.getElementById('sendBtn');
        area.classList.remove('hidden');
        if(btn) btn.disabled = true;
        let time = 10;
        document.getElementById('seconds').innerText = time;
        const intr = setInterval(() => {
            time--;
            document.getElementById('seconds').innerText = time;
            if(time <= 0) { 
                clearInterval(intr); 
                area.classList.add('hidden'); 
                isWaiting = false; 
                if(btn) btn.disabled = false;
            }
        }, 1000);
    }

    async function saveSubmission(q, ans, isCorrect) {
        const data = {
            student: studentName,
            questionText: q.text,
            userAnswer: ans,
            hasFlag: !!q.answer,
            isCorrect: q.answer ? isCorrect : null,
            timestamp: new Date().toISOString()
        };
        await fetch(`${BASE_URL}submissions.json`, { method: 'POST', body: JSON.stringify(data) });
    }
</script>
</body>
</html>

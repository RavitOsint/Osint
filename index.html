<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Student Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* עיצוב כהה ומקצועי - ללא תיבות לבנות */
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #38bdf8; 
            --error: #ef4444; 
            --text: #f1f5f9;
            --input-bg: #334155;
        }
        
        body { 
            font-family: 'Assistant', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { width: 90%; max-width: 500px; text-align: center; }

        .card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* שדות קלט כהים שמשתלבים בעיצוב */
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 10px; 
            border: 1px solid #475569; 
            background: var(--input-bg); 
            color: white; 
            font-size: 1.1rem; 
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        button { 
            background: var(--accent); 
            color: var(--bg); 
            border: none; 
            padding: 15px 30px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.2rem; 
            transition: 0.3s; 
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }

        .option-btn { 
            background: var(--input-bg); 
            color: white; 
            margin: 10px 0; 
            text-align: right; 
            border: 1px solid #475569; 
            font-size: 1rem;
        }

        .timer-msg { 
            color: var(--error); 
            font-weight: bold; 
            margin: 20px 0; 
            padding: 15px; 
            background: rgba(239, 68, 68, 0.1); 
            border-radius: 10px; 
            border: 1px solid var(--error); 
        }

        .progress { color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }
        .hidden { display: none !important; }

        h1 { margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="card">
        <h1>CyberQuest</h1>
        <p>הזן שם כדי להתחיל במשימה</p>
        <input type="text" id="studentName" placeholder="שם מלא של החניך">
        <button onclick="startApp()">התחל מבחן</button>
    </div>

    <div id="waitScreen" class="card hidden">
        <h2>ממתין לשידור המורה...</h2>
        <p>המבחן יתחיל ברגע שהמורה תפעיל את הקטגוריה.</p>
    </div>

    <div id="questionScreen" class="card hidden">
        <div id="progress" class="progress"></div>
        <h2 id="questionTitle"></h2>
        
        <div id="punishmentArea" class="timer-msg hidden">
            תשובה שגויה! המתן <span id="seconds">10</span> שניות...
        </div>
        
        <div id="ansArea"></div>
        
        <div id="openAnsArea" class="hidden">
            <input type="text" id="openAnswer" placeholder="הקלד כאן את התשובה...">
            <button id="sendBtn" onclick="submitOpen()">שלח תשובה</button>
        </div>
    </div>

    <div id="finishScreen" class="card hidden">
        <h1 style="color: var(--success)">המשימה הושלמה! 🏆</h1>
        <p>כל הכבוד, התשובות שלך נשלחו בהצלחה.</p>
        <button onclick="location.reload()" style="background: #64748b; margin-top: 20px;">חזרה להתחלה</button>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    let studentName = "", currentQuestions = [], currentIndex = 0, gameMode = "quiz", isWaiting = false;

    async function startApp() {
        studentName = document.getElementById('studentName').value.trim();
        if (!studentName) return alert("נא להזין שם");
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('waitScreen').classList.remove('hidden');
        sync(); 
        setInterval(sync, 4000); // בדיקת עדכוני מורה כל 4 שניות
    }

    async function sync() {
        const res = await fetch(`${BASE_URL}settings.json`);
        const settings = await res.json();
        if (!settings) return;

        gameMode = settings.gameMode || "quiz";
        
        if (settings.activeCategory && currentQuestions.length === 0) {
            const qRes = await fetch(`${BASE_URL}questions.json`);
            const allQs = await qRes.json();
            currentQuestions = Object.values(allQs || {}).filter(q => q.category === settings.activeCategory);
            if(currentQuestions.length > 0) showQuestion();
        }
    }

    function showQuestion() {
        if (currentIndex >= currentQuestions.length) {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('finishScreen').classList.remove('hidden');
            return;
        }

        document.getElementById('waitScreen').classList.add('hidden');
        document.getElementById('questionScreen').classList.remove('hidden');
        
        const q = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `שאלה ${currentIndex + 1} מתוך ${currentQuestions.length}`;
        document.getElementById('questionTitle').innerText = q.text;
        
        const ansArea = document.getElementById('ansArea');
        const openArea = document.getElementById('openAnsArea');
        ansArea.innerHTML = "";
        
        if (q.type === 'multiple') {
            openArea.classList.add('hidden');
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                ansArea.appendChild(btn);
            });
        } else {
            openArea.classList.remove('hidden');
            document.getElementById('openAnswer').value = "";
        }
    }

    async function checkAnswer(userAns) {
        if (isWaiting) return;
        const q = currentQuestions[currentIndex];
        const isCorrect = (q.answer && userAns.trim().toLowerCase() === q.answer.trim().toLowerCase());

        // לוגיקת הפרדה:
        if (gameMode === 'escape') {
            // בחדר בריחה: אם יש תשובה מוגדרת והמשתמש טעה -> ענישה
            if (q.answer && !isCorrect) {
                startPunishment();
                return;
            }
        }
        
        // אם הגענו לכאן: או שזה בוחן רגיל (עוברים תמיד) או שזה חדר בריחה והתשובה נכונה
        await saveSubmission(q, userAns, isCorrect);
        currentIndex++;
        showQuestion();
    }

    function submitOpen() {
        const val = document.getElementById('openAnswer').value.trim();
        if (!val) return;
        checkAnswer(val);
    }

    function startPunishment() {
        isWaiting = true;
        const area = document.getElementById('punishmentArea');
        const secSpan = document.getElementById('seconds');
        const sendBtn = document.getElementById('sendBtn');
        
        area.classList.remove('hidden');
        if(sendBtn) sendBtn.disabled = true;
        
        let timeLeft = 10;
        secSpan.innerText = timeLeft;
        
        const interval = setInterval(() => {
            timeLeft--;
            secSpan.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                area.classList.add('hidden');
                if(sendBtn) sendBtn.disabled = false;
                isWaiting = false;
            }
        }, 1000);
    }

    async function saveSubmission(q, ans, isCorrect) {
        const data = {
            student: studentName,
            questionText: q.text,
            userAnswer: ans,
            hasFlag: !!q.answer,
            isCorrect: q.answer ? isCorrect : null,
            timestamp: new Date().toISOString()
        };
        await fetch(`${BASE_URL}submissions.json`, { method: 'POST', body: JSON.stringify(data) });
    }
</script>
</body>
</html>

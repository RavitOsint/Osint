<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberQuest - Terminal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent-color: #38bdf8; --text-color: #f1f5f9; --error-color: #ef4444; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Assistant', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        .terminal-card { background: var(--card-bg); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .terminal-header { background: rgba(0,0,0,0.2); padding: 12px; display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .content { padding: 30px; text-align: center; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 2px solid #334155; border-radius: 8px; color: white; font-family: 'Fira Code', monospace; text-align: center; margin: 15px 0; }
        button { width: 100%; padding: 12px; background: var(--accent-color); color: var(--bg-color); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .option-btn { background: #334155; color: white; border: 1px solid #475569; text-align: right; margin-bottom: 8px; font-family: 'Assistant', sans-serif; }
        .status { margin-top: 15px; font-weight: bold; font-size: 0.9em; }
        .hidden { display: none !important; }
        #timer { font-size: 1.5em; color: var(--error-color); font-family: 'Fira Code', monospace; }
    </style>
</head>
<body>
<div class="container">
    <div class="terminal-card">
        <div class="terminal-header"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
        <div class="content">
            <div id="login">
                <h2>CyberQuest Login</h2>
                <input type="text" id="sName" placeholder="שם מלא">
                <button onclick="start()">התחבר</button>
            </div>
            <div id="game" class="hidden">
                <h3 id="cat" style="color:var(--accent-color)"></h3>
                <p id="qText" style="font-family:'Fira Code', monospace"></p>
                <div id="ansArea"></div>
                <div id="openArea" class="hidden">
                    <input type="text" id="userAns" placeholder="הקלד תשובה...">
                    <button id="sendBtn" onclick="submitAns()">שלח פקודה</button>
                </div>
                <div id="msg" class="status"></div>
                <div id="timer"></div>
            </div>
            <div id="finish" class="hidden">
                <h2 style="color: #10b981">המערכת נפרצה! 🏆</h2>
                <button onclick="location.reload()">חזרה להתחלה</button>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "https://osint-751d7-default-rtdb.europe-west1.firebasedatabase.app/";
    let name = "", questions = [], index = 0, mode = "quiz", waiting = false;

    async function start() {
        name = document.getElementById('sName').value.trim();
        if(!name) return;
        document.getElementById('login').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        sync(); setInterval(sync, 4000);
    }

    async function sync() {
        const sRes = await fetch(`${BASE_URL}settings.json`);
        const settings = await sRes.json();
        if(!settings) return;
        mode = settings.gameMode;
        if(settings.activeCategory && questions.length === 0) {
            const qRes = await fetch(`${BASE_URL}questions.json`);
            const all = await qRes.json();
            questions = Object.values(all || {}).filter(q => q.category === settings.activeCategory);
            if(questions.length > 0) { document.getElementById('cat').innerText = settings.activeCategory; showQ(); }
        }
    }

    function showQ() {
        if(index >= questions.length) {
            document.getElementById('game').classList.add('hidden');
            document.getElementById('finish').classList.remove('hidden');
            return;
        }
        const q = questions[index];
        document.getElementById('qText').innerText = q.text;
        document.getElementById('msg').innerText = `משימה ${index+1} מתוך ${questions.length}`;
        const aa = document.getElementById('ansArea'), oa = document.getElementById('openArea');
        aa.innerHTML = "";
        if(q.type === 'multiple') {
            oa.classList.add('hidden');
            q.options.forEach(opt => {
                const b = document.createElement('button'); b.className="option-btn"; b.innerText=opt;
                b.onclick = () => submitAns(opt); aa.appendChild(b);
            });
        } else { oa.classList.remove('hidden'); document.getElementById('userAns').value = ""; }
    }

    async function submitAns(val) {
        if(waiting) return;
        const q = questions[index], userVal = val || document.getElementById('userAns').value.trim();
        if(!userVal) return;
        const correct = (q.answer && userVal.toLowerCase() === q.answer.toLowerCase());

        if(mode === 'escape' && q.hasFlag && !correct) {
            penalty(); return;
        }

        await fetch(`${BASE_URL}submissions.json`, { method:'POST', body: JSON.stringify({
            student: name, questionText: q.text, userAnswer: userVal, isCorrect: q.hasFlag ? correct : null
        })});
        index++; showQ();
    }

    function penalty() {
        waiting = true; let t = 10;
        document.getElementById('msg').innerText = "טעות בקוד! המערכת נעולה...";
        const i = setInterval(() => {
            document.getElementById('timer').innerText = `00:${t<10?'0':''}${t}`;
            t--; if(t<0) { clearInterval(i); document.getElementById('timer').innerText=""; waiting=false; document.getElementById('msg').innerText=""; }
        }, 1000);
    }
</script>
</body>
</html>
